<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
        <div class="heading-container">
            <div class="connection-container">
                <h3 class="connection-status">Not connected</h3>
                <span class="connection-circle"></span>
            </div>
            <div class="file-create-container">
                <input type="text" name="file-name" id="file-name-input" value="data.txt">
                <button class="file-create-button" id="csv-button">Save as CSV</button>
            </div>
        </div>
        <div class="graph-container">
            <div class="graph">
                <canvas id="pressureGraph"></canvas>
            </div>
            <div class="graph">
                <canvas id="tempGraph"></canvas>
            </div>
        </div>
    </main>
  </body>
</html>
